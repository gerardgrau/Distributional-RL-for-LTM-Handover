# Smoke Test (All 1000 protocol)
system:
  tx_power: 25
  noise_level: -174
  receiver_sensitivity: -95

simulation:
  total_sim_time: 10
  time_step: 0.1
  ue_number: 10
  bs_number: 7

agent:
  type: "qrdqn"
  hidden_dims: [64, 64]
  lr: 1e-3
  gamma: 0.9
  tau: 0.01
  buffer_size: 1000
  batch_size: 32
  num_quantiles: 10
  risk_type: "cvar"
  risk_fraction: 0.1
  epsilon_start: 1.0
  epsilon_end: 0.05
  epsilon_mult: 0.9
  num_episodes: 2

benchmark:
  num_seeds: 1
  results_dir: "results/benchmarks"
  env_type: "ltm"

ho_reward:
  alpha_hof: 0.1
  alpha_ho: 0.8
  alpha_pp: 0.9

ho_state:
  moving_average_window: 50

ho_prep:
  periodicity_rsrp_measurement: 0.02
  average_rsrp_measurement_nl1: 10
  kl3: 8
  preparation_power_offset: -3
  preparation_time: 0.04
  exec_power_offset: 3
  max_number_prepared_bs: 4

paths:
  channel_data_directory: "data/ChannelGains"
