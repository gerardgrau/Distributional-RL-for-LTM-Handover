# Overnight 2026-05-24: cvar_truncated ANCHOR under v2 physics.
# N=25, alpha=0.10 -> k = ceil(25 * 0.10) = 3 effective quantiles in [0, 0.10].
# This is the matched-N comparison vs baselines_v2 QR-DQN midpoint N=25.
# Budget: 3 seeds x 1000 ep.

system:
  tx_power: 25
  noise_level: -101
  receiver_sensitivity: -95

simulation:
  total_sim_time: 300
  time_step: 0.01
  ue_number: 1000
  bs_number: 7

agent:
  type: "qrdqn"
  hidden_dims: [128, 128]
  lr: 1.0e-4
  gamma: 0.9
  tau: 0.01
  buffer_size: 100000
  batch_size: 256
  train_freq: 4
  num_quantiles: 25
  quantile_mode: "midpoint"
  risk_type: "cvar"
  risk_fraction: 0.10
  truncate_upper_quantiles: true
  kappa: 1.0
  epsilon_start: 1.0
  epsilon_end: 0.05
  epsilon_mult: 0.995
  num_episodes: 1000

benchmark:
  num_seeds: 3
  results_dir: "results/benchmarks"
  env_type: "ltm"

ho_reward:
  alpha_hof: 0.1
  alpha_ho: 0.8
  alpha_pp: 0.9

ho_state:
  moving_average_window: 50

ho_prep:
  periodicity_rsrp_measurement: 0.02
  average_rsrp_measurement_nl1: 10
  kl3: 8
  preparation_power_offset: -3
  preparation_time: 0.04
  exec_power_offset: 3.0
  max_number_prepared_bs: 5

paths:
  channel_data_directory: "data/ChannelGains"
  precomputed_data_directory: "data/Precomputed"
  dataset_subdir: "no_ris"
