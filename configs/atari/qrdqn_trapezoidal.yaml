# QR-DQN on Atari with trapezoidal-rule quantile placement.
# q_min/q_max are chosen from the standard Atari range under reward-clipping
# (reward in {-1, 0, +1}). With gamma=0.99 the Q-value range is roughly
# [-100, 100], so we set q_min=-50, q_max=50 as conservative fixed endpoints.

agent:
  type: "qrdqn"
  trunk_type: "cnn"
  cnn_feature_dim: 512
  lr: 2.5e-4
  gamma: 0.99
  tau: 1.0
  target_update_freq: 8000
  buffer_size: 100000
  batch_size: 32
  num_quantiles: 50
  quantile_mode: "trapezoidal"
  q_min: -50.0
  q_max: 50.0
  epsilon_start: 1.0
  epsilon_end: 0.01
  epsilon_decay_frames: 1000000
  train_freq: 4
  learn_start: 5000
  clip_reward: true
  kappa: 1.0
