# Standard DQN on Atari, Nature-DQN hyperparameters. Non-distributional
# baseline for the quantile-mode comparison.

agent:
  type: "dqn"
  trunk_type: "cnn"
  cnn_feature_dim: 512
  lr: 2.5e-4
  gamma: 0.99
  tau: 1.0
  target_update_freq: 8000
  buffer_size: 100000
  batch_size: 32
  hidden_dims: [512]
  epsilon_start: 1.0
  epsilon_end: 0.01
  epsilon_decay_frames: 1000000
  train_freq: 4
  learn_start: 5000
  clip_reward: true
