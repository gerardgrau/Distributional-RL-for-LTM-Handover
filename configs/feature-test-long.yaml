# Feature Test Long Configuration (3x longer: ~27-30 mins)
system:
  tx_power: 25
  noise_level: -174
  receiver_sensitivity: -95

simulation:
  total_sim_time: 300
  time_step: 0.01
  ue_number: 1000
  bs_number: 7
  train_split: 0.8

agent:
  type: "qrdqn"
  hidden_dims: [128, 128]
  lr: 1e-4
  gamma: 0.99
  tau: 0.005
  target_update_freq: 1000
  buffer_size: 50000
  batch_size: 64
  num_quantiles: 10
  risk_type: "cvar"
  risk_fraction: 0.1
  epsilon_start: 1.0
  epsilon_end: 0.05
  epsilon_mult: 0.995
  num_episodes: 120           # 3x longer than previous run (40 -> 120)

benchmark:
  num_seeds: 1
  results_dir: "results/benchmarks"
  env_type: "ltm"

ho_reward:
  alpha_hof: 0.1
  alpha_ho: 0.8
  alpha_pp: 0.9

ho_state:
  moving_average_window: 50

ho_prep:
  periodicity_rsrp_measurement: 0.02
  average_rsrp_measurement_nl1: 10
  kl3: 8
  preparation_power_offset: -3
  preparation_time: 0.04
  exec_power_offset: 3
  max_number_prepared_bs: 5

paths:
  channel_data_directory: "data/ChannelGains"
