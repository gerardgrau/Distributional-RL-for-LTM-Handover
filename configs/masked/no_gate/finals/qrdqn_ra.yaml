# CANONICAL FINAL — no-gate (learned_trigger) + prepared-mask + event-driven.
# Risk-AVERSE QR-DQN (CVaR). 2000 ep x 5 seeds, mean-MCS reward, tf8, gamma 0.9.
# N=20 midpoint + truncate_upper, CVaR risk_fraction 0.50, kappa 0.25 — the RA
# gate-probe backbone (bmk_2026-06-02_19), scaled to the canonical 2000x5 budget.
# (If the alpha-sweep ablation strongly favours a different risk_fraction, change
# it before this launches.)

system:
  tx_power: 25
  noise_level: -101
  receiver_sensitivity: -95

simulation:
  total_sim_time: 300
  time_step: 0.01
  ue_number: 1000
  bs_number: 7
  event_driven: true
  learned_trigger: true

agent:
  type: "qrdqn"
  hidden_dims: [256, 256]
  lr: 1.0e-4
  gamma: 0.9
  tau: 0.01
  buffer_size: 100000
  batch_size: 256
  train_freq: 8
  num_quantiles: 20
  quantile_mode: "midpoint"
  risk_type: "cvar"
  risk_fraction: 0.10
  truncate_upper_quantiles: true
  kappa: 0.25
  epsilon_start: 1.0
  epsilon_end: 0.05
  epsilon_mult: 0.995
  num_episodes: 2000

benchmark:
  num_seeds: 5
  results_dir: "results/benchmarks"
  env_type: "ltm"

ho_reward:
  alpha_hof: 0.1
  alpha_ho: 0.8
  alpha_pp: 0.9

ho_state:
  moving_average_window: 50

ho_prep:
  periodicity_rsrp_measurement: 0.02
  average_rsrp_measurement_nl1: 10
  kl3: 8
  preparation_power_offset: -3
  preparation_time: 0.04
  exec_power_offset: 3.0
  max_number_prepared_bs: 5

paths:
  channel_data_directory: "data/ChannelGains"
  precomputed_data_directory: "data/Precomputed"
  dataset_subdir: "no_ris"
