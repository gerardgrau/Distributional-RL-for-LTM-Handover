# Quantile-mode study: Beta-prior tau distortion, Variant 1 (risk-sensitive /
# outlier-blind). tau_i = Beta^{-1}_{alpha,beta}(u_i) with u_i uniform
# midpoints, but mean_weights and predictor_weights stay uniform 1/N. The
# loss "knows" about the new tau placement via the QR Huber asymmetry, but
# expectation and loss aggregation behave like vanilla QR-DQN (plain mean).
# Budget: 1 seed x 1000 episodes (sweep policy).

system:
  tx_power: 25
  noise_level: -174
  receiver_sensitivity: -95

simulation:
  total_sim_time: 300
  time_step: 0.01
  ue_number: 1000
  bs_number: 7

agent:
  type: "qrdqn"
  hidden_dims: [128, 128]
  lr: 1.0e-4
  gamma: 0.9
  tau: 0.01
  buffer_size: 100000
  batch_size: 256
  num_quantiles: 50
  quantile_mode: "beta_equal"
  beta_alpha: 2.0
  beta_beta: 2.0
  epsilon_start: 1.0
  epsilon_end: 0.05
  epsilon_mult: 0.995
  num_episodes: 1000

benchmark:
  num_seeds: 1
  results_dir: "results/benchmarks"
  env_type: "ltm"

ho_reward:
  alpha_hof: 0.1
  alpha_ho: 0.8
  alpha_pp: 0.9

ho_state:
  moving_average_window: 50

ho_prep:
  periodicity_rsrp_measurement: 0.02
  average_rsrp_measurement_nl1: 10
  kl3: 8
  preparation_power_offset: -3
  preparation_time: 0.04
  exec_power_offset: 3.0
  max_number_prepared_bs: 4

paths:
  channel_data_directory: "data/ChannelGains"
  precomputed_data_directory: "data/Precomputed"
  dataset_subdir: "no_ris"
