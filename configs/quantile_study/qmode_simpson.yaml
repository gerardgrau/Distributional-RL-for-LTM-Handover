# Quantile-mode study: composite Simpson 1/3 rule with fixed endpoints.
# Uniform grid of N=51 nodes (must be odd for Simpson 1/3); network predicts
# the N-2 = 49 interior quantiles at tau_i = i / (N-1). Endpoints are fixed
# at F^{-1}(0) = q_min = 0 and F^{-1}(1) = q_max = 15, same anchoring as the
# trapezoidal variant.
#
# Simpson's rule is order-4 accurate vs midpoint/trapezoidal's order-2, but
# uses uniform tau (unlike Gauss-Legendre). Hypothesis: on piecewise-linear
# integrands produced by ReLU networks, Simpson may match GL's quadrature
# benefit without GL's boundary under-training caveat (boundary atoms here
# are *fixed*, so any non-uniform predictor weighting only redistributes
# capacity within the interior, not toward fixed-and-unused endpoints).
#
# Predictor-axis Simpson weights for interior nodes follow the 4:2:4:...:4
# pattern (ratio at most 2:1, much milder than GL's ~100:1).
#
# Budget: 1 seed x 2000 episodes.

system:
  tx_power: 25
  noise_level: -174
  receiver_sensitivity: -95

simulation:
  total_sim_time: 300
  time_step: 0.01
  ue_number: 1000
  bs_number: 7

agent:
  type: "qrdqn"
  hidden_dims: [128, 128]
  lr: 1.0e-4
  gamma: 0.9
  tau: 0.01
  buffer_size: 100000
  batch_size: 256
  num_quantiles: 51
  quantile_mode: "simpson"
  q_min: 0.0
  q_max: 15.0
  epsilon_start: 1.0
  epsilon_end: 0.05
  epsilon_mult: 0.995
  num_episodes: 1000

benchmark:
  num_seeds: 1
  results_dir: "results/benchmarks"
  env_type: "ltm"

ho_reward:
  alpha_hof: 0.1
  alpha_ho: 0.8
  alpha_pp: 0.9

ho_state:
  moving_average_window: 50

ho_prep:
  periodicity_rsrp_measurement: 0.02
  average_rsrp_measurement_nl1: 10
  kl3: 8
  preparation_power_offset: -3
  preparation_time: 0.04
  exec_power_offset: 3.0
  max_number_prepared_bs: 4

paths:
  channel_data_directory: "data/ChannelGains"
  precomputed_data_directory: "data/Precomputed"
  dataset_subdir: "no_ris"
