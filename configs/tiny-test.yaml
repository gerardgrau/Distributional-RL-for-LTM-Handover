system:
  tx_power: 25
  noise_level: -174
  receiver_sensitivity: -95

simulation:
  total_sim_time: 10
  time_step: 0.1
  ue_number: 1
  bs_number: 7

agent:
  type: 'dqn'
  num_episodes: 2
  buffer_size: 100
  batch_size: 32
  epsilon_start: 1.0
  epsilon_end: 0.05
  epsilon_mult: 0.9
  hidden_dims: [32]
  lr: 1e-3
  gamma: 0.9
  tau: 0.01
  num_quantiles: 20

benchmark:
  num_seeds: 1
  env_type: 'ltm'
  results_dir: 'results/benchmarks'

ho_reward:
  alpha_hof: 0.1
  alpha_ho: 0.8
  alpha_pp: 0.9

ho_state:
  moving_average_window: 10

ho_prep:
  periodicity_rsrp_measurement: 0.02
  average_rsrp_measurement_nl1: 10
  kl3: 8
  preparation_power_offset: -3
  preparation_time: 0.04
  exec_power_offset: 3
  max_number_prepared_bs: 5

paths:
  channel_data_directory: "data/ChannelGains"
