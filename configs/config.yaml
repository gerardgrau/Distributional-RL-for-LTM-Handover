# Global Configuration for Distributional RL for LTM Handover

system:
  tx_power: 25                # Aligned with CMAB paper
  noise_level: -174           # dBm
  receiver_sensitivity: -95   # dBm

simulation:
  total_sim_time: 300         # seconds (Aligned with CMAP paper)
  time_step: 0.01             # 10 ms (10e-3)
  ue_number: 1000             # Increased to full dataset for 500-ep run
  bs_number: 7                # Set to 7 for hexagonal cells

agent:
  type: "dqn"                 # "dqn" or "qrdqn"
  hidden_dims: [128, 128]
  lr: 1e-3
  gamma: 0.9
  tau: 0.01
  target_update_freq: 1000
  buffer_size: 100000
  batch_size: 256
  num_quantiles: 50           # Only for qrdqn
  epsilon_start: 1.0
  epsilon_end: 0.05
  epsilon_mult: 0.995         # Exponential decay per episode
  num_episodes: 500

benchmark:
  num_seeds: 2                # 2 seeds for definitive results
  results_dir: "results/benchmarks"      # Directory for benchmark logs
  env_type: "ltm"             # "ltm" or "atari" (ale_py)

ho_reward:
  alpha_hof: 0.1
  alpha_ho: 0.8
  alpha_pp: 0.9

ho_state:
  moving_average_window: 50

ho_prep:
  periodicity_rsrp_measurement: 0.02    # 20 ms
  average_rsrp_measurement_nl1: 10      # FIR filter length
  kl3: 8                                # L3 IIR constant
  preparation_power_offset: -3          # dB
  preparation_time: 0.04                # 40 ms
  exec_power_offset: 3                  # dB
  max_number_prepared_bs: 5             # Max prepared cells

paths:
  channel_data_directory: "data/ChannelGains"
